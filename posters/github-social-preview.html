<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Poster Maker — GitHub Social Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #161818;
    font-family: 'Inter', sans-serif;
    color: #eae9e5;
    overflow: hidden;
    position: relative;
    letter-spacing: -0.02em;
  }

  /* Dot pattern background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at center, rgba(56, 117, 200, 0.2) 1.2px, transparent 1.2px);
    background-size: 20px 20px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 10%, transparent 65%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 10%, transparent 65%);
    pointer-events: none;
  }

  /* Subtle glow */
  body::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 400px;
    background: radial-gradient(circle, rgba(56, 117, 200, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-family: 'Libre Baskerville', serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -1.5px;
    color: #eae9e5;
    text-align: center;
  }

  .headline .accent {
    color: #3875c8;
  }

  .tagline {
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
    color: #94a3b8;
    text-align: center;
  }

  .badge {
    font-size: 14px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  /* Fit-to-window preview */
  @media screen {
    html { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f1010; }
  }

  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
  <div class="content">
    <div class="badge">Open Source</div>
    <div class="headline">Poster <span class="accent">Maker</span></div>
    <div class="tagline">Describe what you want. Claude Code designs it in HTML/CSS.<br>Playwright renders it to PNG/PDF.</div>
  </div>

  <script>
    (function() {
      const w = 1280, h = 640;
      function fit() {
        const s = Math.min(window.innerWidth / w, window.innerHeight / h, 1);
        document.body.style.transform = 'scale(' + s + ')';
        document.body.style.transformOrigin = 'top left';
        document.body.style.position = 'absolute';
        document.body.style.left = ((window.innerWidth - w * s) / 2) + 'px';
        document.body.style.top = ((window.innerHeight - h * s) / 2) + 'px';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
