<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ReleaseRocket Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }

  .logo-wrapper {
    position: relative;
    width: 920px;
    height: 920px;
    border-radius: 22.37%;
    overflow: visible;
  }

  .logo-wrapper img {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 22.37%;
  }

  /* Subtle border */
  .logo-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22.37%;
    border: 2px solid rgba(100, 160, 255, 0.35);
    pointer-events: none;
    z-index: 1;
  }

  /* Fit-to-window preview */
  @media screen {
    html { height: 100vh; display: flex; justify-content: center; align-items: center; }
  }

  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* Outer glow */
  .logo-wrapper::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 24%;
    border: 1.5px solid rgba(100, 160, 255, 0.15);
    box-shadow:
      0 0 30px -5px rgba(80, 140, 255, 0.25),
      0 0 60px -10px rgba(80, 140, 255, 0.15),
      inset 0 0 30px -5px rgba(80, 140, 255, 0.1);
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="logo-wrapper">
    <img src="../assets/releaserocket/logo-raw.png" alt="ReleaseRocket">
  </div>

  <script>
    (function() {
      const w = 1024, h = 1024;
      function fit() {
        const s = Math.min(window.innerWidth / w, window.innerHeight / h, 1);
        document.body.style.transform = 'scale(' + s + ')';
        document.body.style.transformOrigin = 'top left';
        document.body.style.position = 'absolute';
        document.body.style.left = ((window.innerWidth - w * s) / 2) + 'px';
        document.body.style.top = ((window.innerHeight - h * s) / 2) + 'px';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
