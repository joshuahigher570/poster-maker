<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ReleaseRocket Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #161818;
    font-family: 'Inter', sans-serif;
    color: #eae9e5;
    overflow: hidden;
    position: relative;
    letter-spacing: -0.02em;
  }

  /* Dot pattern background (matches landing page DotPattern component) */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at center, rgba(56, 117, 200, 0.25) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    mask-image: radial-gradient(ellipse 70% 55% at 50% 38%, black 15%, transparent 65%);
    -webkit-mask-image: radial-gradient(ellipse 70% 55% at 50% 38%, black 15%, transparent 65%);
    pointer-events: none;
  }

  /* Subtle primary glow behind logo area */
  body::after {
    content: '';
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(56, 117, 200, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 300px 80px 280px;
    height: 100%;
    position: relative;
    z-index: 1;
  }

  .logo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
  }

  .logo-wrapper {
    position: relative;
    width: 180px;
    height: 180px;
    border-radius: 22.37%;
    margin-bottom: 56px;
  }

  .logo-wrapper img {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 22.37%;
  }

  .logo-wrapper::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 24%;
    border: 1px solid rgba(56, 117, 200, 0.25);
    box-shadow: 0 0 50px -8px rgba(56, 117, 200, 0.2);
    pointer-events: none;
  }

  .headline {
    font-family: 'Libre Baskerville', serif;
    font-size: 68px;
    font-weight: 700;
    line-height: 1.15;
    text-align: center;
    letter-spacing: -1.5px;
    margin-bottom: 36px;
    color: #eae9e5;
  }

  .headline .accent {
    color: #3875c8;
  }

  .spacer {
    flex: 1;
  }

  .tagline {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.6;
    text-align: center;
    color: #94a3b8;
    max-width: 720px;
    margin-bottom: 56px;
  }

  .url {
    font-size: 32px;
    font-weight: 600;
    color: #3875c8;
    letter-spacing: 0;
  }

  /* Fit-to-window preview */
  @media screen {
    html { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f1010; }
  }

  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo-section">
      <div class="logo-wrapper">
        <img src="../assets/releaserocket/logo-raw.png" alt="ReleaseRocket">
      </div>
      <div class="headline">
        You shipped it.<br>
        Now <span class="accent">tell them</span>.
      </div>
    </div>

    <div class="spacer"></div>

    <div class="tagline">
      Turn GitHub releases into announcements<br>
      across every channel. Automatically.
    </div>

    <div class="url">releaserocket.io</div>
  </div>

  <script>
    (function() {
      const w = 1080, h = 1920;
      function fit() {
        const s = Math.min(window.innerWidth / w, window.innerHeight / h, 1);
        document.body.style.transform = 'scale(' + s + ')';
        document.body.style.transformOrigin = 'top left';
        document.body.style.position = 'absolute';
        document.body.style.left = ((window.innerWidth - w * s) / 2) + 'px';
        document.body.style.top = ((window.innerHeight - h * s) / 2) + 'px';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
